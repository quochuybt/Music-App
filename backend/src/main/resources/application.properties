spring.application.name=vietmusic
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/music_app}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:change_me_to_a_random_256_bit_secret_before_deploying}
jwt.expiration=${JWT_EXPIRATION:86400000}

server.port=${SERVER_PORT:8080}

app.upload-dir=${UPLOAD_DIR:uploads}
app.upload.max-audio-size=${UPLOAD_MAX_AUDIO_SIZE:20971520}
app.upload.max-image-size=${UPLOAD_MAX_IMAGE_SIZE:5242880}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.seed.enabled=${APP_SEED_ENABLED:false}
app.seed.admin-password=${APP_SEED_ADMIN_PASSWORD:}
app.seed.user-password=${APP_SEED_USER_PASSWORD:}
