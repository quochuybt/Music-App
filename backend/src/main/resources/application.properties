spring.application.name=vietmusic
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/music_app}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:change_me_to_a_random_256_bit_secret_before_deploying}
jwt.expiration=${JWT_EXPIRATION:86400000}

server.port=${SERVER_PORT:8080}

app.upload-dir=${UPLOAD_DIR:uploads}
app.upload.max-audio-size=${UPLOAD_MAX_AUDIO_SIZE:20971520}
app.upload.max-image-size=${UPLOAD_MAX_IMAGE_SIZE:5242880}
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_AUDIO_SIZE:20971520}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_REQUEST_SIZE:22020096}
app.cloudinary.enabled=${CLOUDINARY_ENABLED:false}
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.folder=${CLOUDINARY_FOLDER:vietmusic}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
app.seed.enabled=${APP_SEED_ENABLED:false}
app.seed.admin-password=${APP_SEED_ADMIN_PASSWORD:}
app.seed.user-password=${APP_SEED_USER_PASSWORD:}
google.client-id=${GOOGLE_CLIENT_ID:}
